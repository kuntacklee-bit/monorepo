
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>App B – 이름 및 날짜 기록 앱</title>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <div class="label-tag">▸ APP-B · MONOREPO TEST</div>
    <h1>이름과 날짜를<br>기록합니다</h1>

    <div class="input-group">
      <input type="text" id="nameInput" placeholder="이름을 입력하세요" maxlength="20" />
    </div>
    <button id="addButton">기록하기</button>
    <button id="toggleButton" class="button-secondary">목록 보기</button>

    <div class="result-list" id="resultList" style="display: none;">
      <ul id="entryList"></ul>
    </div>

    <div class="footer-line">VERCEL PROJECT B · FIREBASE PROJECT B</div>
  </div>

  <script type="module">
    import { db } from './src/firebase.js'; // 'firebaseB.js' 에서 'firebase.js'로 수정
    import { collection, addDoc, getDocs, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

    const nameInput = document.getElementById('nameInput');
    const entryList = document.getElementById('entryList');
    const resultList = document.getElementById('resultList');
    const toggleButton = document.getElementById('toggleButton');
    const addButton = document.getElementById('addButton');

    const entriesCol = collection(db, 'entries_app_b');

    async function loadEntries() {
        entryList.innerHTML = '';
        const q = query(entriesCol, orderBy("timestamp", "desc"));
        const querySnapshot = await getDocs(q);
        querySnapshot.forEach((doc) => {
            const entry = doc.data();
            const date = entry.timestamp ? entry.timestamp.toDate().toLocaleString('ko-KR') : '날짜 없음';
            addEntryToListDOM(entry.name, date);
        });
    }

    async function addEntry() {
      const name = nameInput.value.trim();
      if (!name) return;

      try {
        await addDoc(entriesCol, {
            name: name,
            timestamp: serverTimestamp()
        });
        if (resultList.style.display === 'block') {
            loadEntries();
        }
      } catch (e) {
        console.error("Error adding document: ", e);
      }
      nameInput.value = '';
    }

    function addEntryToListDOM(name, date) {
        const li = document.createElement('li');
        li.textContent = `${name} - ${date}`;
        entryList.appendChild(li);
    }

    function toggleList() {
        if (resultList.style.display === 'none') {
            resultList.style.display = 'block';
            toggleButton.textContent = '목록 닫기';
            loadEntries();
        } else {
            resultList.style.display = 'none';
            toggleButton.textContent = '목록 보기';
        }
    }

    addButton.addEventListener('click', addEntry);
    toggleButton.addEventListener('click', toggleList);
    nameInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') addEntry();
    });
  </script>
</body>
</html>
