
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>App A – 이름 및 날짜 기록 앱</title>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <div class="label-tag">▸ APP-A · MONOREPO TEST</div>
    <h1>이름과 날짜를<br>기록합니다</h1>

    <div class="input-group">
      <input type="text" id="nameInput" placeholder="이름을 입력하세요" maxlength="20" />
    </div>
    <button id="addButton">기록하기</button>
    <button id="toggleButton" class="button-secondary">목록 보기</button>

    <div class="result-list" id="resultList" style="display: none;">
      <ul id="entryList"></ul>
    </div>

    <div class="footer-line">VERCEL PROJECT A · FIREBASE PROJECT A</div>
  </div>

  <script type="module">
    import { db } from './src/firebaseA.js';
    import { collection, addDoc, getDocs, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

    // DOM Elements
    const nameInput = document.getElementById('nameInput');
    const entryList = document.getElementById('entryList');
    const resultList = document.getElementById('resultList');
    const toggleButton = document.getElementById('toggleButton');
    const addButton = document.getElementById('addButton');

    // Firestore Collection
    const entriesCol = collection(db, 'entries_app_a');

    // --- Utility Functions ---
    function setLoading(isLoading) {
        addButton.disabled = isLoading;
        toggleButton.disabled = isLoading;
        if (isLoading) {
            entryList.innerHTML = '<li>목록을 불러오는 중입니다...</li>';
        }
    }

    function showError(error) {
        console.error("Firebase Error: ", error);
        entryList.innerHTML = `<li>오류가 발생했습니다: ${error.message}. <br>콘솔(F12)을 확인해주세요.</li>`;
        alert(`오류가 발생했습니다. Firebase 보안 규칙을 확인해보세요.`);
    }

    // --- Core Functions ---
    async function loadEntries() {
        setLoading(true);
        entryList.innerHTML = ''; // Clear previous content
        try {
            const q = query(entriesCol, orderBy("timestamp", "desc"));
            const querySnapshot = await getDocs(q);
            if (querySnapshot.empty) {
                entryList.innerHTML = '<li>기록된 내용이 없습니다.</li>';
            } else {
                querySnapshot.forEach((doc) => {
                    const entry = doc.data();
                    const date = entry.timestamp ? entry.timestamp.toDate().toLocaleString('ko-KR') : '날짜 없음';
                    addEntryToListDOM(entry.name, date);
                });
            }
        } catch (e) {
            showError(e);
        } finally {
            setLoading(false);
        }
    }

    async function addEntry() {
      const name = nameInput.value.trim();
      if (!name) return;

      addButton.disabled = true;
      addButton.textContent = '저장 중...';

      try {
        await addDoc(entriesCol, {
            name: name,
            timestamp: serverTimestamp()
        });
        nameInput.value = '';
        if (resultList.style.display === 'block') {
            await loadEntries(); // Refresh the list
        }
      } catch (e) {
        console.error("Error adding document: ", e);
        alert(`저장에 실패했습니다: ${e.message}`);
      } finally {
        addButton.disabled = false;
        addButton.textContent = '기록하기';
      }
    }

    function addEntryToListDOM(name, date) {
        const li = document.createElement('li');
        li.textContent = `${name} - ${date}`;
        entryList.prepend(li); // Prepend to show newest first
    }

    function toggleList() {
        const isHidden = resultList.style.display === 'none';
        resultList.style.display = isHidden ? 'block' : 'none';
        toggleButton.textContent = isHidden ? '목록 닫기' : '목록 보기';
        if (isHidden) {
            loadEntries();
        }
    }

    // --- Event Listeners ---
    addButton.addEventListener('click', addEntry);
    toggleButton.addEventListener('click', toggleList);
    nameInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault(); // Prevent form submission if it's in a form
        addEntry();
      }
    });
  </script>
</body>
</html>
