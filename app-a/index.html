
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>App A – 이름 및 날짜 기록 앱</title>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <div class="card">
    <div class="label-tag">▸ APP-A · MONOREPO TEST</div>
    <h1>이름과 날짜를<br>기록합니다</h1>

    <div class="input-group">
      <input type="text" id="nameInput" placeholder="이름을 입력하세요" maxlength="20" />
    </div>
    <button onclick="addEntry()">기록하기</button>
    <button onclick="toggleList()" id="toggleButton" class="button-secondary">목록 보기</button>

    <div class="result-list" id="resultList">
      <ul id="entryList"></ul>
    </div>

    <div class="footer-line">VERCEL PROJECT A · FIREBASE PROJECT A</div>
  </div>

  <script type="module">
    import { db } from './src/firebase.js';
    import { collection, addDoc, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

    const input = document.getElementById('nameInput');
    const entryList = document.getElementById('entryList');
    const resultList = document.getElementById('resultList');
    const toggleButton = document.getElementById('toggleButton');

    // Firestore collection reference
    const entriesCol = collection(db, 'entries_app_a');

    async function loadEntries() {
        entryList.innerHTML = ''; // Clear the list first
        const querySnapshot = await getDocs(entriesCol);
        querySnapshot.forEach((doc) => {
            const entry = doc.data();
            const date = entry.timestamp.toDate().toLocaleString('ko-KR');
            addEntryToList(entry.name, date);
        });
    }

    async function addEntry() {
      const name = input.value.trim();
      if (!name) return;

      try {
        await addDoc(entriesCol, {
            name: name,
            timestamp: serverTimestamp()
        });
        // Refresh the list to show the new entry
        loadEntries();
      } catch (e) {
        console.error("Error adding document: ", e);
      }

      input.value = '';
    }

    function addEntryToList(name, date) {
        const li = document.createElement('li');
        li.textContent = `${name} - ${date}`;
        // Prepend to show the newest first
        entryList.prepend(li);
    }

    function toggleList() {
        if (resultList.style.display === 'none' || resultList.style.display === '') {
            resultList.style.display = 'block';
            toggleButton.textContent = '목록 닫기';
            loadEntries(); // Load entries when the list is shown
        } else {
            resultList.style.display = 'none';
            toggleButton.textContent = '목록 보기';
        }
    }

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') addEntry();
    });

    // Make functions globally available
    window.addEntry = addEntry;
    window.toggleList = toggleList;
  </script>
</body>
</html>
