
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>App A – 이름 및 날짜 기록 앱</title>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #c8f060;
      --text: #e8e8e8;
      --muted: #555;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      pointer-events: none;
    }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 52px 48px;
      width: 460px;
      animation: fadeUp 0.6s ease both;
    }

    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      border-color: var(--accent);
      border-style: solid;
    }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .label-tag {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    h1 {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 28px;
      font-weight: 800;
      line-height: 1.3;
      margin-bottom: 40px;
      color: #fff;
    }

    .input-group {
      display: flex;
      gap: 0;
      margin-bottom: 10px;
      border: 1px solid var(--border);
      transition: border-color 0.2s;
    }
    .input-group:focus-within {
      border-color: var(--accent);
    }

    input[type="text"] {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 14px 18px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 15px;
      color: var(--text);
      caret-color: var(--accent);
    }
    input::placeholder { color: var(--muted); }

    button {
      background: var(--accent);
      color: #0d0d0d;
      border: none;
      padding: 14px 22px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      width: 100%;
    }
    button:hover { background: #d8ff6a; }
    button:active { transform: scale(0.97); }

    .button-secondary {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text);
        margin-top: 10px;
    }
    .button-secondary:hover {
        background: var(--border);
    }

    .result-list {
      margin-top: 20px;
      min-height: 120px;
      max-height: 240px;
      overflow-y: auto;
      border: 1px solid var(--border);
      padding: 10px;
      display: none; /* Initially hidden */
    }

    .result-list ul {
      list-style: none;
    }

    .result-list li {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 18px;
      color: var(--accent);
      margin-bottom: 8px;
      opacity: 0;
      transform: translateY(8px);
      animation: listItemFadeIn 0.4s ease forwards;
    }

    .footer-line {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.15em;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes listItemFadeIn {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="label-tag">▸ APP-A · MONOREPO TEST</div>
    <h1>이름과 날짜를<br>기록합니다</h1>

    <div class="input-group">
      <input type="text" id="nameInput" placeholder="이름을 입력하세요" maxlength="20" />
    </div>
    <button onclick="addEntry()">기록하기</button>
    <button onclick="toggleList()" id="toggleButton" class="button-secondary">목록 보기</button>

    <div class="result-list" id="resultList">
      <ul id="entryList"></ul>
    </div>

    <div class="footer-line">VERCEL PROJECT A · FIREBASE PROJECT A</div>
  </div>

  <script>
    const input = document.getElementById('nameInput');
    const entryList = document.getElementById('entryList');
    const resultList = document.getElementById('resultList');
    const toggleButton = document.getElementById('toggleButton');

    // Load entries from local storage on page load
    window.onload = function() {
        const entries = JSON.parse(localStorage.getItem('entries_app_a')) || [];
        entries.forEach(entry => {
            addEntryToList(entry.name, entry.date);
        });
    }

    function addEntry() {
      const name = input.value.trim();
      if (!name) return;

      const now = new Date();
      const dateString = now.toLocaleString('ko-KR');
      
      addEntryToList(name, dateString);

      const entries = JSON.parse(localStorage.getItem('entries_app_a')) || [];
      entries.push({ name, date: dateString });
      localStorage.setItem('entries_app_a', JSON.stringify(entries));

      input.value = '';
    }

    function addEntryToList(name, date) {
        const li = document.createElement('li');
        li.textContent = `${name} - ${date}`;
        entryList.appendChild(li);
    }

    function toggleList() {
        if (resultList.style.display === 'none' || resultList.style.display === '') {
            resultList.style.display = 'block';
            toggleButton.textContent = '목록 닫기';
        } else {
            resultList.style.display = 'none';
            toggleButton.textContent = '목록 보기';
        }
    }

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') addEntry();
    });
  </script>
</body>
</html>
